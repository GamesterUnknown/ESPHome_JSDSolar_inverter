# ===========================================================================
#  BINARY SENSORS – derived from alarm / fault registers
# ===========================================================================
binary_sensor:
  - platform: status
    name: "${friendly_name} Online"

  # Fan fault: non-zero Fan Status register
  - platform: modbus_controller
    modbus_controller_id: inverter
    name: "${friendly_name} Fan Fault"
    id: fan_fault
    register_type: holding
    address: 0x0321         # DEC 801 – Fan status (0=OK)
    bitmask: 0xFFFF

  # BMS connected: communication status != 0
  - platform: modbus_controller
    modbus_controller_id: inverter
    name: "${friendly_name} BMS Connected"
    id: bms_connected
    register_type: holding
    address: 0x008F         # DEC 143 – BMS communication status
    bitmask: 0xFFFF
