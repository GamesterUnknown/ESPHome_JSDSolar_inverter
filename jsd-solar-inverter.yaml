# ===========================================================================
#  SELECT SENSORS – derived from settings registers
# ===========================================================================

select:
  - platform: modbus_controller
    modbus_controller_id: inverter
    id: set_output_voltage
    name: "${friendly_name} Menu 01: Output Voltage"
    entity_category: config
    address: 16640 # 0x4100
    value_type: U_WORD
    optimistic: true
    use_write_multiple: true
    skip_updates: ${skip_times}
    optionsmap:
    #  "208V": 0
      "220V": 1
      "230V": 2
      "240V": 3

  - platform: modbus_controller
    modbus_controller_id: inverter
    id: set_output_freq
    name: "${friendly_name} Menu 02: Output Frequency"
    entity_category: config
    address: 16641 # 0x4101
    value_type: U_WORD
    optimistic: true
    use_write_multiple: true
    skip_updates: ${skip_times}
    optionsmap:
      "50Hz": 0
      "60Hz": 1

  - platform: modbus_controller
    modbus_controller_id: inverter
    id: set_output_priority
    name: "${friendly_name} Menu 03: Output Priority"
    entity_category: config
    address: 16642 # 0x4102
    value_type: U_WORD
    optimistic: true
    use_write_multiple: true
    skip_updates: ${skip_times}
    optionsmap:
      "GPB (Grid-PV-Battery)": 0
      "PGB (PV-Grid-Battery)": 1
      "PBG (PV-Battery-Grid)": 2
      "MKS Mode": 3
  
  - platform: modbus_controller
    modbus_controller_id: inverter
    id: set_operating_mode
    name: "${friendly_name} Menu 04: Operating Mode"
    entity_category: config
    address: 16643 # 0x4103
    value_type: U_WORD
    optimistic: true
    use_write_multiple: true
    skip_updates: ${skip_times}
    # Згідно з таблицею: 0:APP, 1:UPS
    optionsmap:
      "APP": 0
      "UPS": 1
      "GEN": 2
    on_value:
      then:
        - lambda: |-
            int current_mode = (int)id(set_operating_mode).active_index().value_or(255);
            auto *low_num = id(set_grid_low_voltage);
            auto *high_num = id(set_grid_high_voltage);

            if (current_mode == 1) {
              // ---  UPS ---
              low_num->traits.set_min_value(170.0f);
              low_num->traits.set_max_value(200.0f);
              if (low_num->state < 170.0f || low_num->state > 200.0f) low_num->publish_state(185.0f);
              high_num->traits.set_max_value(264.0f);
              if (high_num->state != 264.0f) high_num->publish_state(264.0f);
            } 
            else if (current_mode == 0 || current_mode == 2) {
              // ---  APP / GEN ---
              low_num->traits.set_min_value(90.0f);
              low_num->traits.set_max_value(154.0f);
              if (low_num->state < 90.0f || low_num->state > 154.0f) low_num->publish_state(154.0f);
              high_num->traits.set_max_value(280.0f);
             // if (high_num->state < 264.0f || high_num->state > 280.0f) high_num->publish_state(270.0f);
            } 
            else {
              // ---  ---
              low_num->traits.set_min_value(90.0f);
              low_num->traits.set_max_value(200.0f);             
              high_num->traits.set_max_value(280.0f);
            }            
            low_num->publish_state(low_num->state);
            high_num->publish_state(high_num->state);
          

