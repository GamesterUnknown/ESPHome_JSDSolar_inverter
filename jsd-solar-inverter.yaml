  - platform: modbus_controller
    modbus_controller_id: inverter
    id: set_dual_output_mode
    name: "${friendly_name} Menu 39: Dual output Duration"
    address: 16665 # 0x4119
    value_type: U_WORD
    skip_updates: ${skip_times}
    entity_category: config
    icon: "mdi:layers-triple-outline" 
    optimistic: true
    use_write_multiple: true
    optionsmap:
      "Disabled": 65521
      "Unlimited Time": 65522
      "Timer": 900
    lambda: |-
      if (x >= 5 && x <= 900) {
        id(set_dual_output_minutes).publish_state(x);
        return std::string("Timer");
      }
      return {}; 

    write_lambda: |-
      if (x == "Timer") {
        float current_state = id(set_dual_output_minutes).state;       
        uint16_t mins = std::isnan(current_state) ? 900 : (uint16_t)current_state;
        if (mins < 5)   mins = 5;
        if (mins > 900) mins = 900;       
        return mins; 
      }
      return value;

    on_value:
      then:
        - lambda: |-
            int raw_val = (int)id(set_dual_output_mode).active_index().value_or(65521);
            if (raw_val >= 5 && raw_val <= 900) {
              id(set_dual_output_minutes).publish_state(raw_val);
            }

