# ===========================================================================
#  TEXT SENSORS  – status / fault codes
# ===========================================================================
text_sensor:
  - platform: wifi_info
    ip_address:
      name: "${friendly_name} IP Address"

  # ── Startup-only: SN code (read once, 10 registers = 20 bytes ASCII) ─────────
  - platform: modbus_controller
    modbus_controller_id: inverter
    name: "${friendly_name} SN Code"
    id: sn_code
    register_type: holding
    address: 0x0000         # DEC 0-9 – Serial Number (20 bytes)
    register_count: 10
    response_size: 20
    raw_encode: ANSI
    update_interval: 24h

  # ── Startup-only: Version registers ─────────────────────────────────────────
  - platform: modbus_controller
    modbus_controller_id: inverter
    name: "${friendly_name} Protocol Version"
    id: protocol_version
    register_type: holding
    address: 0x0010         # DEC 16-17 – Protocol version H+L (2 regs = 4 bytes)
    register_count: 2
    response_size: 4
    raw_encode: HEXBYTES
    update_interval: 24h

  - platform: modbus_controller
