###############################################################################
# ESPHome configuration for JSD Solar 3KU Inverter – Modbus RTU logger
# Register source: INV-Modbus地址表3KU（外发）V1.20.xlsx
#
# Hardware:  ESP32 + RS485 TTL adapter
# Inverter:  JSD Solar 3KU (single-phase logic assumed; only Phase A registers)
# Baud rate: 9600 (default for JSD inverters; adjust if needed)
# Modbus ID: 1 (default)
###############################################################################

substitutions:
  device_name: jsd-solar-inverter
  friendly_name: "JSD Solar Inverter"
  modbus_id: "1"            # Modbus device address
  update_interval: "10s"    # How often to poll sensors
  update_interval_slow: "60s"  # Energy counters – less frequent

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}

esp32:
  board: esp32dev
  framework:
    type: arduino

# ── WiFi ──────────────────────────────────────────────────────────────────────
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${friendly_name} Hotspot"
    password: !secret ap_password

captive_portal:

# ── API / OTA ─────────────────────────────────────────────────────────────────
api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

# ── Logger ────────────────────────────────────────────────────────────────────
logger:
  level: INFO
  logs:
    modbus_controller: DEBUG
    modbus_controller.sensor: WARN
    modbus_controller.binary_sensor: WARN
    component: ERROR            # Suppress slow-component warnings

# ── UART (RS-485 adapter) ─────────────────────────────────────────────────────
uart:
  id: uart_modbus
  tx_pin: GPIO17              # Adjust to your wiring
  rx_pin: GPIO16              # Adjust to your wiring
  baud_rate: 9600
  stop_bits: 1
  parity: NONE
  data_bits: 8
  # Uncomment to debug raw bytes:
  # debug:
  #   direction: BOTH
  #   dummy_receiver: false

# ── Modbus ────────────────────────────────────────────────────────────────────
modbus:
  id: modbus_bus
  uart_id: uart_modbus
  send_wait_time: 250ms

# ── Modbus controller ─────────────────────────────────────────────────────────
modbus_controller:
  - id: inverter
    address: ${modbus_id}
    modbus_id: modbus_bus
    setup_priority: -10
    update_interval: ${update_interval}
    # Allow one missed poll before marking offline
    offline_skip_updates: 2

# ===========================================================================
#  SENSORS
# ===========================================================================
sensor:

  # ── Uptime / WiFi diagnostics ──────────────────────────────────────────────
  - platform: uptime
    name: "${friendly_name} Uptime"

  - platform: wifi_signal
    name: "${friendly_name} WiFi Signal"
    update_interval: 60s

  # ==========================================================================
  # WF_Simplify block  (registers 0x0040 – 0x009D)
  # Single-phase single-inverter: Phase-A + Battery + PV summary
  # ==========================================================================

  # ── Grid / Mains – Phase A ─────────────────────────────────────────────────
  - platform: modbus_controller
    modbus_controller_id: inverter
    name: "${friendly_name} Grid Voltage"
    id: grid_voltage
    register_type: holding
    address: 0x0050         # DEC 80 – Phase A mains voltage
    unit_of_measurement: "V"
    device_class: voltage
    state_class: measurement
    accuracy_decimals: 1
    filters:
      - multiply: 0.1

  - platform: modbus_controller
    modbus_controller_id: inverter
    name: "${friendly_name} Grid Current"
    id: grid_current
    register_type: holding
    address: 0x0051         # DEC 81 – Phase A mains current
    unit_of_measurement: "A"
    device_class: current
    state_class: measurement
    accuracy_decimals: 2
    filters:
      - multiply: 0.01

  - platform: modbus_controller
    modbus_controller_id: inverter
    name: "${friendly_name} Grid Frequency"
    id: grid_frequency
    register_type: holding
    address: 0x0052         # DEC 82 – Phase A mains frequency
    unit_of_measurement: "Hz"
    device_class: frequency
    state_class: measurement
    accuracy_decimals: 2
    filters:
      - multiply: 0.01

  - platform: modbus_controller
    modbus_controller_id: inverter
    name: "${friendly_name} Grid Power"
    id: grid_power
    register_type: holding
    address: 0x0053         # DEC 83 – Phase A mains power (signed, 1W)
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    accuracy_decimals: 0
    value_type: S_WORD

  # ── Load / Output – Phase A ───────────────────────────────────────────────
  - platform: modbus_controller
    modbus_controller_id: inverter
    name: "${friendly_name} Load Voltage"
    id: load_voltage
    register_type: holding
    address: 0x0058         # DEC 88 – Phase A load voltage
    unit_of_measurement: "V"
    device_class: voltage
    state_class: measurement
    accuracy_decimals: 1
    filters:
      - multiply: 0.1

  - platform: modbus_controller
    modbus_controller_id: inverter
    name: "${friendly_name} Load Current"
    id: load_current
    register_type: holding
    address: 0x0059         # DEC 89 – Phase A load current
    unit_of_measurement: "A"
    device_class: current
    state_class: measurement
    accuracy_decimals: 2
    filters:
      - multiply: 0.01

  - platform: modbus_controller
    modbus_controller_id: inverter
    name: "${friendly_name} Load Frequency"
    id: load_frequency
    register_type: holding
    address: 0x005A         # DEC 90 – Phase A load frequency
    unit_of_measurement: "Hz"
    device_class: frequency
    state_class: measurement
    accuracy_decimals: 2
    filters:
      - multiply: 0.01

  - platform: modbus_controller
    modbus_controller_id: inverter
    name: "${friendly_name} Load Active Power"
    id: load_active_power
    register_type: holding
    address: 0x005B         # DEC 91 – Phase A load active power
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    accuracy_decimals: 0
    value_type: S_WORD

  - platform: modbus_controller
    modbus_controller_id: inverter
    name: "${friendly_name} Load Apparent Power"
    id: load_apparent_power
    register_type: holding
    address: 0x005C         # DEC 92 – Phase A load apparent power
    unit_of_measurement: "VA"
    state_class: measurement
    accuracy_decimals: 0
    value_type: S_WORD

  - platform: modbus_controller
    modbus_controller_id: inverter
    name: "${friendly_name} Load Percentage"
    id: load_percentage
    register_type: holding
    address: 0x005D         # DEC 93 – Phase A load percentage
    unit_of_measurement: "%"
    state_class: measurement
    accuracy_decimals: 1
    filters:
      - multiply: 0.1

  # ── Battery ────────────────────────────────────────────────────────────────
  - platform: modbus_controller
    modbus_controller_id: inverter
    name: "${friendly_name} Battery Voltage"
    id: battery_voltage
    register_type: holding
    address: 0x0080         # DEC 128 – Positive terminal battery voltage
    unit_of_measurement: "V"
    device_class: voltage
    state_class: measurement
    accuracy_decimals: 1
    filters:
      - multiply: 0.1

  - platform: modbus_controller
    modbus_controller_id: inverter
    name: "${friendly_name} Battery Current"
    id: battery_current
    register_type: holding
    address: 0x0081         # DEC 129 – Positive terminal battery current
    unit_of_measurement: "A"
    device_class: current
    state_class: measurement
    accuracy_decimals: 1
    filters:
      - multiply: 0.1
    value_type: S_WORD      # signed – positive=charging, negative=discharging

  - platform: modbus_controller
    modbus_controller_id: inverter
    name: "${friendly_name} Battery SOC"
    id: battery_soc
    register_type: holding
    address: 0x0084         # DEC 132 – Battery capacity percentage
    unit_of_measurement: "%"
    device_class: battery
    state_class: measurement
    accuracy_decimals: 1
    filters:
      - multiply: 0.1

  - platform: modbus_controller
    modbus_controller_id: inverter
    name: "${friendly_name} Battery Power"
    id: battery_power
    register_type: holding
    address: 0x0085         # DEC 133 – Battery power (signed, 1W)
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    accuracy_decimals: 0
    value_type: S_WORD

  # ── BMS (if connected) ────────────────────────────────────────────────────
  - platform: modbus_controller
    modbus_controller_id: inverter
    name: "${friendly_name} BMS Voltage"
    id: bms_voltage
    register_type: holding
    address: 0x0088         # DEC 136 – BMS Battery Voltage
    unit_of_measurement: "V"
    device_class: voltage
    state_class: measurement
    accuracy_decimals: 1
    filters:
      - multiply: 0.1

  - platform: modbus_controller
    modbus_controller_id: inverter
    name: "${friendly_name} BMS Current"
    id: bms_current
    register_type: holding
    address: 0x0089         # DEC 137 – BMS Battery Current
    unit_of_measurement: "A"
    device_class: current
    state_class: measurement
    accuracy_decimals: 1
    filters:
      - multiply: 0.1
    value_type: S_WORD

  - platform: modbus_controller
    modbus_controller_id: inverter
    name: "${friendly_name} BMS SOC"
    id: bms_soc
    register_type: holding
    address: 0x008A         # DEC 138 – BMS SOC
    unit_of_measurement: "%"
    device_class: battery
    state_class: measurement
    accuracy_decimals: 0

  - platform: modbus_controller
    modbus_controller_id: inverter
    name: "${friendly_name} BMS Temperature"
    id: bms_temperature
    register_type: holding
    address: 0x008B         # DEC 139 – BMS Temperature
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 0
    value_type: S_WORD

  # ── Photovoltaic (PV) ─────────────────────────────────────────────────────
  - platform: modbus_controller
    modbus_controller_id: inverter
    name: "${friendly_name} PV1 Voltage"
    id: pv1_voltage
    register_type: holding
    address: 0x0096         # DEC 150 – Photovoltaic voltage 1
    unit_of_measurement: "V"
    device_class: voltage
    state_class: measurement
    accuracy_decimals: 1
    filters:
      - multiply: 0.1

  - platform: modbus_controller
    modbus_controller_id: inverter
    name: "${friendly_name} PV1 Current"
    id: pv1_current
    register_type: holding
    address: 0x0097         # DEC 151 – Photovoltaic 1 current
    unit_of_measurement: "A"
    device_class: current
    state_class: measurement
    accuracy_decimals: 2
    filters:
      - multiply: 0.01

  - platform: modbus_controller
    modbus_controller_id: inverter
    name: "${friendly_name} PV1 Power"
    id: pv1_power
    register_type: holding
    address: 0x0098         # DEC 152 – Photovoltaic power
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    accuracy_decimals: 0
    value_type: S_WORD

  - platform: modbus_controller
    modbus_controller_id: inverter
    name: "${friendly_name} PV2 Voltage"
    id: pv2_voltage
    register_type: holding
    address: 0x0099         # DEC 153 – Photovoltaic 2 voltage
    unit_of_measurement: "V"
    device_class: voltage
    state_class: measurement
    accuracy_decimals: 1
    filters:
      - multiply: 0.1

  - platform: modbus_controller
    modbus_controller_id: inverter
    name: "${friendly_name} PV2 Current"
    id: pv2_current
    register_type: holding
    address: 0x009A         # DEC 154 – Photovoltaic 2 current
    unit_of_measurement: "A"
    device_class: current
    state_class: measurement
    accuracy_decimals: 2
    filters:
      - multiply: 0.01

  - platform: modbus_controller
    modbus_controller_id: inverter
    name: "${friendly_name} PV2 Power"
    id: pv2_power
    register_type: holding
    address: 0x009B         # DEC 155 – Photovoltaic 2 power
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    accuracy_decimals: 0
    value_type: S_WORD

  # ── PV Energy counters (slower update) ────────────────────────────────────
  - platform: modbus_controller
    modbus_controller_id: inverter
    name: "${friendly_name} PV Energy Today"
    id: pv_energy_today
    register_type: holding
    address: 0x009C         # DEC 156 – PV power generation today (100Wh)
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: total_increasing
    accuracy_decimals: 2
    filters:
      - multiply: 0.1       # 100Wh → 0.1 kWh per unit
    update_interval: ${update_interval_slow}

  - platform: modbus_controller
    modbus_controller_id: inverter
    name: "${friendly_name} PV Energy Total"
    id: pv_energy_total
    register_type: holding
    address: 0x009D         # DEC 157 – Total PV generation (100Wh)
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: total_increasing
    accuracy_decimals: 2
    filters:
      - multiply: 0.1
    update_interval: ${update_interval_slow}

  # ── Temperatures ──────────────────────────────────────────────────────────
  - platform: modbus_controller
    modbus_controller_id: inverter
    name: "${friendly_name} PV Temperature"
    id: temp_pv
    register_type: holding
    address: 0x0330         # DEC 816
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 0
    value_type: S_WORD

  - platform: modbus_controller
    modbus_controller_id: inverter
    name: "${friendly_name} Inverter Temperature"
    id: temp_inv
    register_type: holding
    address: 0x0331         # DEC 817
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 0
    value_type: S_WORD

  - platform: modbus_controller
    modbus_controller_id: inverter
    name: "${friendly_name} Charger Temperature"
    id: temp_chg
    register_type: holding
    address: 0x0332         # DEC 818
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 0
    value_type: S_WORD

  - platform: modbus_controller
    modbus_controller_id: inverter
    name: "${friendly_name} Ambient Temperature"
    id: temp_ambient
    register_type: holding
    address: 0x0334         # DEC 820
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 0
    value_type: S_WORD

  # ── Fan ───────────────────────────────────────────────────────────────────
  - platform: modbus_controller
    modbus_controller_id: inverter
    name: "${friendly_name} Fan Speed"
    id: fan_speed
    register_type: holding
    address: 0x0320         # DEC 800
    unit_of_measurement: "%"
    state_class: measurement
    accuracy_decimals: 0

  # ── Output registers (WF_OP) ──────────────────────────────────────────────
  - platform: modbus_controller
    modbus_controller_id: inverter
    name: "${friendly_name} Output Voltage"
    id: output_voltage
    register_type: holding
    address: 0x0218         # DEC 536 – A-phase output voltage
    unit_of_measurement: "V"
    device_class: voltage
    state_class: measurement
    accuracy_decimals: 1
    filters:
      - multiply: 0.1

  - platform: modbus_controller
    modbus_controller_id: inverter
    name: "${friendly_name} Output Frequency"
    id: output_frequency
    register_type: holding
    address: 0x0219         # DEC 537 – Phase A output frequency
    unit_of_measurement: "Hz"
    device_class: frequency
    state_class: measurement
    accuracy_decimals: 2
    filters:
      - multiply: 0.01

  - platform: modbus_controller
    modbus_controller_id: inverter
    name: "${friendly_name} Output Current"
    id: output_current
    register_type: holding
    address: 0x021A         # DEC 538 – Phase A output current
    unit_of_measurement: "A"
    device_class: current
    state_class: measurement
    accuracy_decimals: 2
    filters:
      - multiply: 0.01

  - platform: modbus_controller
    modbus_controller_id: inverter
    name: "${friendly_name} Output Active Power"
    id: output_active_power
    register_type: holding
    address: 0x021C         # DEC 540 – Phase A output active power
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    accuracy_decimals: 0
    value_type: S_WORD

  - platform: modbus_controller
    modbus_controller_id: inverter
    name: "${friendly_name} Output Load Percentage"
    id: output_load_pct
    register_type: holding
    address: 0x0220         # DEC 544 – Phase A load percentage
    unit_of_measurement: "%"
    state_class: measurement
    accuracy_decimals: 1
    filters:
      - multiply: 0.1

  # ── WF_PV – detailed PV from dedicated block ──────────────────────────────
  - platform: modbus_controller
    modbus_controller_id: inverter
    name: "${friendly_name} PV Total Voltage"
    id: pv_total_voltage
    register_type: holding
    address: 0x0260         # DEC 608
    unit_of_measurement: "V"
    device_class: voltage
    state_class: measurement
    accuracy_decimals: 1
    filters:
      - multiply: 0.1

  - platform: modbus_controller
    modbus_controller_id: inverter
    name: "${friendly_name} PV Total Power"
    id: pv_total_power
    register_type: holding
    address: 0x0263         # DEC 611 – Total PV power H word (1W, int16)
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    accuracy_decimals: 0
    value_type: S_WORD

  # ── WF_LINE – Phase A mains (detailed block) ────────────────────────────────
  - platform: modbus_controller
    modbus_controller_id: inverter
    name: "${friendly_name} Line Grid Voltage"
    id: line_grid_voltage
    register_type: holding
    address: 0x01B0         # DEC 432 – Phase A mains voltage
    unit_of_measurement: "V"
    device_class: voltage
    state_class: measurement
    accuracy_decimals: 1
    value_type: S_WORD
    filters:
      - multiply: 0.1

  - platform: modbus_controller
    modbus_controller_id: inverter
    name: "${friendly_name} Line Grid Current"
    id: line_grid_current
    register_type: holding
    address: 0x01B1         # DEC 433 – Phase A mains current
    unit_of_measurement: "A"
    device_class: current
    state_class: measurement
    accuracy_decimals: 2
    value_type: S_WORD
    filters:
      - multiply: 0.01

  - platform: modbus_controller
    modbus_controller_id: inverter
    name: "${friendly_name} Line Grid Frequency"
    id: line_grid_frequency
    register_type: holding
    address: 0x01B2         # DEC 434 – Phase A mains frequency
    unit_of_measurement: "Hz"
    device_class: frequency
    state_class: measurement
    accuracy_decimals: 2
    value_type: S_WORD
    filters:
      - multiply: 0.01

  - platform: modbus_controller
    modbus_controller_id: inverter
    name: "${friendly_name} Line Grid Power"
    id: line_grid_power
    register_type: holding
    address: 0x01B3         # DEC 435 – Phase A mains power (10W)
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    accuracy_decimals: 0
    value_type: S_WORD
    filters:
      - multiply: 10

  - platform: modbus_controller
    modbus_controller_id: inverter
    name: "${friendly_name} Line Grid Consumption Power"
    id: line_grid_consumption_power
    register_type: holding
    address: 0x01B4         # DEC 436 – Phase A AC consumption power (10W)
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    accuracy_decimals: 0
    value_type: S_WORD
    filters:
      - multiply: 10

  # ── WF_LINE – Grid energy counters (32-bit H+L pairs, unit = 10 Wh) ─────────
  - platform: modbus_controller
    modbus_controller_id: inverter
    name: "${friendly_name} Grid Feed-in Today"
    id: grid_feedin_today
    register_type: holding
    address: 0x01B7         # DEC 439-440
    register_count: 2
    value_type: U_DWORD
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: total_increasing
    accuracy_decimals: 2
    filters:
      - multiply: 0.01       # 10Wh → kWh
    update_interval: ${update_interval_slow}

  - platform: modbus_controller
    modbus_controller_id: inverter
    name: "${friendly_name} Grid Feed-in Month"
    id: grid_feedin_month
    register_type: holding
    address: 0x01B9         # DEC 441-442
    register_count: 2
    value_type: U_DWORD
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: total_increasing
    accuracy_decimals: 2
    filters:
      - multiply: 0.01
    update_interval: ${update_interval_slow}

  - platform: modbus_controller
    modbus_controller_id: inverter
    name: "${friendly_name} Grid Feed-in Year"
    id: grid_feedin_year
    register_type: holding
    address: 0x01BB         # DEC 443-444
    register_count: 2
    value_type: U_DWORD
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: total_increasing
    accuracy_decimals: 2
    filters:
      - multiply: 0.01
    update_interval: ${update_interval_slow}

  - platform: modbus_controller
    modbus_controller_id: inverter
    name: "${friendly_name} Grid Feed-in Total"
    id: grid_feedin_total
    register_type: holding
    address: 0x01BD         # DEC 445-446
    register_count: 2
    value_type: U_DWORD
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: total_increasing
    accuracy_decimals: 2
    filters:
      - multiply: 0.01
    update_interval: ${update_interval_slow}

  - platform: modbus_controller
    modbus_controller_id: inverter
    name: "${friendly_name} Grid Consumption Today"
    id: grid_consumption_today
    register_type: holding
    address: 0x01BF         # DEC 447-448
    register_count: 2
    value_type: U_DWORD
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: total_increasing
    accuracy_decimals: 2
    filters:
      - multiply: 0.01
    update_interval: ${update_interval_slow}

  - platform: modbus_controller
    modbus_controller_id: inverter
    name: "${friendly_name} Grid Consumption Month"
    id: grid_consumption_month
    register_type: holding
    address: 0x01C1         # DEC 449-450
    register_count: 2
    value_type: U_DWORD
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: total_increasing
    accuracy_decimals: 2
    filters:
      - multiply: 0.01
    update_interval: ${update_interval_slow}

  - platform: modbus_controller
    modbus_controller_id: inverter
    name: "${friendly_name} Grid Consumption Year"
    id: grid_consumption_year
    register_type: holding
    address: 0x01C3         # DEC 451-452
    register_count: 2
    value_type: U_DWORD
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: total_increasing
    accuracy_decimals: 2
    filters:
      - multiply: 0.01
    update_interval: ${update_interval_slow}

  - platform: modbus_controller
    modbus_controller_id: inverter
    name: "${friendly_name} Grid Consumption Total"
    id: grid_consumption_total
    register_type: holding
    address: 0x01C5         # DEC 453-454
    register_count: 2
    value_type: U_DWORD
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: total_increasing
    accuracy_decimals: 2
    filters:
      - multiply: 0.01
    update_interval: ${update_interval_slow}

  # ── WF_OP – Output energy counters (32-bit H+L pairs, unit = 10 Wh) ──────────
  - platform: modbus_controller
    modbus_controller_id: inverter
    name: "${friendly_name} Output Energy Today"
    id: output_energy_today
    register_type: holding
    address: 0x0221         # DEC 545-546
    register_count: 2
    value_type: U_DWORD
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: total_increasing
    accuracy_decimals: 2
    filters:
      - multiply: 0.01
    update_interval: ${update_interval_slow}

  - platform: modbus_controller
    modbus_controller_id: inverter
    name: "${friendly_name} Output Energy Month"
    id: output_energy_month
    register_type: holding
    address: 0x0223         # DEC 547-548
    register_count: 2
