###############################################################################
# ESPHome configuration for JSD Solar Inverter – Modbus RTU logger
# Register source: INV-Modbus地址表3KU（外发）V1.20.xlsx
#
# Hardware:  ESP32 + RS232 TTL adapter
# Inverter:  JSD Solar 3KU (single-phase logic assumed; only Phase A registers)
# Baud rate: 9600 (default for JSD inverters; adjust if needed)
# Modbus ID: 1 (default)
###############################################################################

substitutions:
  device_name: "jsdsolar"
  friendly_name: "JSDSolar Inverter"
  device_description: "JSDSolar Inverter 12kW"
  modbus_id: "1"            # Modbus device address
  update_interval: "10s"    # How often to poll sensors
  skip_times: 1  # Setting registers
  skip_times2: 360 #Static info registers
  skip_times3: 6  # Energy counters
  safe_mode_delay: "60s"

# For 48V invertors
  bat_low_volt_min: 41.2
  bat_low_volt_max: 54
  bat_shutdown_volt_min: 40
  bat_shutdown_volt_max: 48
  bat_bulk_volt_min: 48
  bat_bulk_volt_max: 60
  bat_float_volt_min: 48
  bat_float_volt_max: 60

# For 24V invertors
#  bat_low_volt_min: 20.6
#  bat_low_volt_max: 27
#  bat_shutdown_volt_min: 20
#  bat_shutdown_volt_max: 24
#  bat_bulk_volt_min: 24
#  bat_bulk_volt_max: 30
#  bat_float_volt_min: 24
#  bat_float_volt_max: 30

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

globals:
  - id: time_synced
    type: bool
    restore_value: no
    initial_value: 'false'

time:
  - platform: homeassistant
    id: s_time

# ── WiFi ──────────────────────────────────────────────────────────────────────
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${friendly_name} Hotspot"
    password: !secret ap_password
  on_connect:
    then:
      - number.set:
          id: inverter_wifi_status
          value: 3 # Connected to WIFI
        
  on_disconnect:
    then:
      - number.set:
          id: inverter_wifi_status
          value: 2 # Disconnected from WIFI

captive_portal:

# ── API / OTA ─────────────────────────────────────────────────────────────────
api:
  encryption:
    key: !secret api_encryption_key
  on_client_disconnected:
   # - delay: ${safe_mode_delay}
   # - if:
   #     condition:
   #       not: api.connected
   #     then:
   - logger.log: "Lost connection to HomeAssistant API"
   - if:
        condition:
          - wifi.connected # Перевіряємо статус Wi-Fi
        then:
          # HA is down WIFI is up
          - number.set:
              id: inverter_wifi_status
              value:  3
        else:
          # WIFI is down, reconnecting
          - number.set:
              id: inverter_wifi_status
              value: 2
  on_client_connected:
    then:
      - number.set:
          id: inverter_wifi_status
          value: 4 # Connected to HA
      #- delay: 5s # Wait for time synchronization with HA server
      - lambda: |-
          if (id(time_synced)) return; // Skip if already synchronized after boot

          auto t = id(s_time).now();
          if (t.is_valid()) {
            std::vector<uint16_t> time_packet = {
              (uint16_t)t.second, (uint16_t)t.minute, (uint16_t)t.hour,
              (uint16_t)t.day_of_month, (uint16_t)t.month, (uint16_t)(t.year - 2000)
            };
            
            auto cmd = esphome::modbus_controller::ModbusCommandItem::create_write_multiple_command(
                id(inverter), 16692, 6, time_packet
            );
            id(inverter)->queue_command(cmd);
            
            id(time_synced) = true; // Lock further automatic synchronization requests
            ESP_LOGI("modbus_time", "Initial automatic time synchronization successful.");
          } else {
            ESP_LOGW("modbus_time", "Automatic sync postponed: HA time source is invalid.");
          }

interval:
  - interval: 15s
    then:
      - lambda: |-
          int new_state = 2; // За замовчуванням — Статус 2 (Connecting)
          
          // 1. ПРАВИЛЬНА ПЕРЕВІРКА API: використовуємо правильний простір імен api::
          if (api::global_api_server != nullptr && api::global_api_server->is_connected()) { 
            new_state = 4;
          // 2. Пряма перевірка активності власної резервної AP плати
          } else if (wifi::global_wifi_component != nullptr && wifi::global_wifi_component->is_ap_active()) { 
            new_state = 1;
          // 3. Пряма перевірка підключення до вашого роутера
          } else if (wifi::global_wifi_component != nullptr && wifi::global_wifi_component->is_connected()) { 
            new_state = 3;
          }

          // ЗАХИСТ ВІД Unknown (0): якщо сенсор порожній (NAN), миттєво відновлюємо його
          if (std::isnan(id(inverter_wifi_status).state)) {
            id(inverter_wifi_status).publish_state(new_state);
            return;
          }

          // Оновлюємо повзунок ТІЛЬКИ якщо вирахуваний new_state дійсно змінився
          if ((int)id(inverter_wifi_status).state != new_state) {
            auto call = id(inverter_wifi_status).make_call();
            call.set_value(new_state);
            call.perform();
            ESP_LOGD("custom", "Wi-Fi status changed to %d. Sensor updated.", new_state);
          }

