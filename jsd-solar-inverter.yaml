# ===========================================================================
#  TEXT SENSORS  – status / fault codes
# ===========================================================================
text_sensor:
  - platform: template
    name: "${friendly_name} Inverter Current Time"
    id: inverter_current_time
    icon: "mdi:clock-select-less"
    update_interval: 5s
    lambda: |-

      if (!id(inv_read_hour).has_state()  || 
       !id(inv_read_min).has_state()   || 
       !id(inv_read_sec).has_state()   || 
       !id(inv_read_day).has_state()   || 
       !id(inv_read_month).has_state() || 
       !id(inv_read_year).has_state()) {
       return {"Waiting for Modbus data..."};
      }

      int sec = (int)id(inv_read_sec).state;
      int min = (int)id(inv_read_min).state;
      int hour = (int)id(inv_read_hour).state;
      int day = (int)id(inv_read_day).state;
      int month = (int)id(inv_read_month).state;
      

      if (hour > 23 || min > 59 || sec > 59 || hour < 0 || min < 0 || sec < 0) {
        return {"Time Data Error"};
      }


      int year = (int)id(inv_read_year).state;
      if (year < 100) {
        year += 2000;
      }
      return esphome::str_sprintf("%02d:%02d:%02d  %02d.%02d.%04d", hour, min, sec, day, month, year);
      
  - platform: wifi_info
    ip_address:
      name: "${friendly_name} IP Address"

  - platform: template
    name: "${friendly_name} WiFi Connection status"
    icon: "mdi:wifi"
    lambda: |- 
      int status_code = (int)id(inverter_wifi_status).state;
      
      switch(status_code) {
        case 1:  return {"WIFI AP active"};
        case 2:  return {"Connecting to WIFI"};
        case 3:  return {"Connected to WIFI"};
        case 4:  return {"Connected to HA"};
        default: 
          return esphome::str_sprintf("Unknown (%d)", status_code);
      }

  # ── Startup-only: SN code (read once, 10 registers = 20 bytes ASCII) ─────────
  - platform: modbus_controller
    modbus_controller_id: inverter
    name: "${friendly_name} SN Code"
    id: sn_code
    register_type: holding
    address: 0x0000         # DEC 0-9 – Serial Number (20 bytes)
    register_count: 10
    response_size: 20
    raw_encode: ANSI
    skip_updates: ${skip_times2}

