# ===========================================================================
#  NUMBER SENSORS  – derived from settings registers
# ===========================================================================

number:
  # ── Battery Low Voltage (V)  x10 ──────────────────
  - platform: modbus_controller
    modbus_controller_id: inverter
    id: set_bat_low_volt
    name: "${friendly_name} Menu 18: Battery Low Voltage Alert"
    register_type: holding
    use_write_multiple: true
    address: 16648 # 0x4108
    value_type: U_WORD
    min_value: ${bat_low_volt_min}
    max_value: ${bat_low_volt_max}
    step: 0.1
    unit_of_measurement: "V"
    skip_updates: ${skip_times}
    multiply: 10 
    mode: box

  # ── Battery Shutdown Voltage (V)  x10 ──────────────────
  - platform: modbus_controller
    modbus_controller_id: inverter
    id: set_bat_shutdown_volt
    name: "${friendly_name} Menu 19: Battery Shutdown Voltage"
    register_type: holding
    use_write_multiple: true
    address: 16649 # 0x4109
    value_type: U_WORD
    min_value: ${bat_shutdown_volt_min}
    max_value: ${bat_shutdown_volt_max}
    step: 0.1
    unit_of_measurement: "V"
    skip_updates: ${skip_times}
    multiply: 10
    mode: box

  # ── Battery Bulk Charging Voltage (V)  x10 ──────────────────
  - platform: modbus_controller
    modbus_controller_id: inverter
    id: set_bat_bulk_volt
    name: "${friendly_name} Menu 20: Bulk Charging Voltage"
    register_type: holding
    use_write_multiple: true
    address: 16650 # 0x410A
    value_type: U_WORD
    min_value: ${bat_bulk_volt_min}
    max_value: ${bat_bulk_volt_max}
    step: 0.1
    unit_of_measurement: "V"
    skip_updates: ${skip_times}
    multiply: 10
    mode: box
  
  # ── Battery Float Charging Voltage (V)  x10 ──────────────────
  - platform: modbus_controller
    modbus_controller_id: inverter
    id: set_bat_float_volt
    name: "${friendly_name} Menu 21: Float Charging Voltage"
    register_type: holding
    use_write_multiple: true
    address: 16651 # 0x410B
    value_type: U_WORD
    min_value: ${bat_float_volt_min}
    max_value: ${bat_float_volt_max}
    step: 0.1
    unit_of_measurement: "V"
    skip_updates: ${skip_times}
    multiply: 10
    mode: box
    
  - platform: modbus_controller
    modbus_controller_id: inverter
    icon: "mdi:lightning-bolt-outline"
    id: set_grid_low_voltage
    name: "${friendly_name} Menu 22: Grid Low Voltage Limit"
    register_type: holding
    use_write_multiple: true
    address: 16654 # 0x410E
    value_type: U_WORD
    min_value: 90.0 
    max_value: 200.0
    step: 1.0       
    unit_of_measurement: "V"
    skip_updates: ${skip_times}
    mode: box 
    lambda: |-
      // При старте, пока данные не вычитаны — возвращаем ваш дефолт 255
      int current_mode = (int)id(set_operating_mode).active_index().value_or(255);
      auto *num = id(set_grid_low_voltage);

      if (current_mode == 1) {
        // КЕЙС 1: Режим 1 (UPS) -> границы 170V - 200V
        num->traits.set_min_value(170.0f);
        num->traits.set_max_value(200.0f);
      } 
      else if (current_mode == 0 || current_mode == 2) {
        // КЕЙС 2: Режимы 0 и 2 -> границы 90V - 154V
        num->traits.set_min_value(90.0f);
        num->traits.set_max_value(154.0f);
      } 
      else {
        // КЕЙС 3: Для всего остального (Режим 3, или дефолт 255 при старте) -> границы 90V - 200V
        num->traits.set_min_value(90.0f);
        num->traits.set_max_value(200.0f);
      }
      
      return x;     

  - platform: modbus_controller
    modbus_controller_id: inverter
    icon: "mdi:lightning-bolt"
    id: set_grid_high_voltage
    name: "${friendly_name} Menu 23: Grid High Voltage Limit"
    register_type: holding
    use_write_multiple: true
    address: 16655 # 0x410F
    value_type: U_WORD
    min_value: 264.0
    max_value: 280.0
    step: 1.0
    unit_of_measurement: "V"
    skip_updates: ${skip_times}  
    mode: box
    lambda: |-
      int current_mode = (int)id(set_operating_mode).active_index().value_or(255);
      auto *num = id(set_grid_high_voltage);
      
      if (current_mode == 1) {
        //  UPS
        num->traits.set_max_value(264.0f);
      } 
      else {
        // APP / GEN
        num->traits.set_max_value(280.0f);
      }
      return x;
      
  # ── Menu 38: Dual output cutoff voltage"
  - platform: modbus_controller
    modbus_controller_id: inverter
    id: set_dual_output_cutoff_voltage
    name: "${friendly_name} Menu 38: Dual output cutoff voltage"
    address: 16664 # 0x4118
