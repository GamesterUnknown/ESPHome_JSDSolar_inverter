# ==========================================================================

# WF_Version block (registers 16-37, 56-63) - Read once on startup

# ==========================================================================

  - platform: modbus_controller
    modbus_controller_id: inverter
    name: "${friendly_name} Protocol version H"
    id: protocol_version_h
    register_type: holding
    address: 0x0010
    value_type: U_WORD
    update_interval: 24h

  - platform: modbus_controller
